<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recurring Task Manager</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Recurring Task Manager</h1>
        <p>Sign in to sync your recurring tasks across devices.</p>
      </header>

      <section class="card" id="config-warning" hidden>
        <h2>Setup needed</h2>
        <p>
          Add your Supabase URL and anon key in <code>app.js</code> before using auth and cloud sync.
        </p>
      </section>

      <section class="card" id="auth-card">
        <h2>Account</h2>
        <form id="auth-form" class="task-form">
          <label>
            Email
            <input id="auth-email" type="email" autocomplete="email" required />
          </label>
          <label>
            Password
            <input id="auth-password" type="password" autocomplete="current-password" required minlength="6" />
          </label>
          <div class="inline-buttons">
            <button type="submit" data-action="login">Log in</button>
            <button type="button" data-action="signup" class="secondary-btn">Sign up</button>
          </div>
        </form>
        <p id="auth-status" class="status-text">Not logged in.</p>
      </section>

      <section class="card" id="task-section" hidden>
        <div class="section-header">
          <h2>Your Tasks</h2>
          <button id="logout-btn" type="button" class="secondary-btn">Log out</button>
        </div>

        <form id="task-form" class="task-form">
          <label>
            Task name
            <input id="task-name" type="text" placeholder="Drink water" required />
          </label>

          <label>
            Repeat every
            <div class="inline-fields">
              <input id="task-interval" type="number" min="1" value="1" required />
              <select id="task-unit">
                <option value="day">Day(s)</option>
                <option value="week">Week(s)</option>
                <option value="month">Month(s)</option>
              </select>
            </div>
          </label>

          <button type="submit">Add Task</button>
        </form>

        <p id="empty-state">No recurring tasks yet. Add one above.</p>
        <ul id="task-list" class="task-list"></ul>
      </section>
    </main>

    <template id="task-item-template">
      <li class="task-item">
        <div class="task-item-main">
          <h3 class="task-title"></h3>
          <p class="task-meta"></p>
          <p class="task-next"></p>
        </div>
        <div class="task-item-actions">
          <button class="complete-btn" type="button">Mark complete</button>
          <button class="delete-btn" type="button">Delete</button>
        </div>
      </li>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
  </body>
</html>
